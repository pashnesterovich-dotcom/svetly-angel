<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2563EB"/>
  <g transform="translate(256,280)">
    <!-- Main peak -->
    <polygon points="0,-140 -120,80 120,80" fill="#ffffff" opacity="0.95"/>
    <!-- Snow cap -->
    <polygon points="0,-140 -32,-80 32,-80" fill="#DBEAFE"/>
    <!-- Secondary peak -->
    <polygon points="-80,-70 -160,80 0,80" fill="#ffffff" opacity="0.6"/>
    <!-- Snow cap 2 -->
    <polygon points="-80,-70 -100,-30 -60,-30" fill="#DBEAFE" opacity="0.7"/>
  </g>
  <!-- Sun -->
  <circle cx="380" cy="120" r="36" fill="#FBBF24" opacity="0.9"/>
</svg>
